name: Documentation Issue
description: Report missing or incorrect documentation
title: "[DOCS]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve our documentation for everyone.

  - type: dropdown
    id: doc_section
    attributes:
      label: Documentation Section
      description: which section of the documentation contains the problem?
      placeholder: "Logging System"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      options:
        - Missing information
        - Incorrect information
        - Outdated information
        - Unclear explanation
        - Broken link
        - Typo/grammar
        - Missing example
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the documentation problem?
      placeholder: "The API reference for method X doesn't explain parameter Y..."
    validations:
      required: true

  - type: textarea
    id: current_text
    attributes:
      label: Current Text
      description: Paste the problematic text (if applicable)
      placeholder: "Current documentation says: ..."
    validations:
      required: false

  - type: textarea
    id: suggested_text
    attributes:
      label: Suggested Change
      description: How should it be corrected?
      placeholder: "It should say: ..."
    validations:
      required: false

  - type: input
    id: url
    attributes:
      label: URL
      description: Link to the documentation page
      placeholder: "https://docs.example.com/api/route"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
      placeholder: "This affects version 1.2.0+..."
    validations:
      required: false